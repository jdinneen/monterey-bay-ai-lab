name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_SUMMARY: "true"

  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on PR commits
        if: github.event_name == 'pull_request'
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          for c in $(git rev-list "$base..$head"); do
            if ! git log -1 --format=%B "$c" | grep -qiE "^Signed-off-by: .+ <.+@.+>"; then
              echo "::error::commit $c is missing a DCO Signed-off-by line"
              missing=1
            fi
          done
          exit $missing

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (CPU test deps)
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas pyarrow pytest
      - name: Run dependency-light gate suite
        run: |
          python -m pytest -q \
            tests/test_seasonal_naive.py \
            tests/test_agent_lock.py \
            tests/test_lakehouse_metrics.py \
            tests/test_promotion_matrix.py \
            tests/test_champion_selector.py \
            tests/test_evidence_gate_agent.py \
            tests/test_data_health_agent.py
      # Note: the full suite (ops/run_tests.py) additionally exercises neural /
      # GPU code paths that need torch + neuralforecast. Add a heavier job with
      # CPU torch if you want full coverage in CI.
