  # ---------------------------------------------------------------- domoic-acid / marine-HAB task
  - model_id: da_forecast_hgbt
    family: tree
    architecture: HistGradientBoostingClassifier + isotonic calibration (DA-history + Pseudo-nitzschia precursor)
    task: domoic_acid_forecasting
    status: production_candidate
    claimable: true
    beats_baseline: "yes — AP 0.232 vs best-naive 0.138; also beats NOAA C-HARM v3.1 nowcast 8/8 stations"
    supports_calibration: true
    dependencies: [scikit-learn]
    entrypoint: research/hab/da_forecast.py
    smoke_command: "python research/hab/da_forecast.py"
    baseline: "seasonal-naive / persistence / station-memory; operational incumbent = NOAA C-HARM v3.1 nowcast"
    output_dir_policy: "reports/hab/ (da_forecast.json / da_forecast.md); never a production leaderboard"
    evidence: reports/hab/da_forecast.json
    blockers: >-
      small test-event count (52 events > 2020); weekly CalHABMAP sampling = ~1-week lead;
      needs a prospective forward-time pilot before an operational claim.
    notes: >-
      Next-visit pDA >= 0.5 ng/mL (=500 ng/L, the C-HARM/CDPH event threshold) at CalHABMAP
      piers, strictly causal (features from the prior visit only). Time holdout (train <=2018,
      isotonic-calibrate 2019-2020, test >2020) + leave-one-station-out: model beats seasonal-
      naive 8/8 stations. Crucially beats the operational NOAA C-HARM nowcast (which uses SAME-day
      satellite+ROMS) 8/8 stations on the 2022-2026 overlap (pooled AP 0.271 vs C-HARM 0.027;
      C-HARM is badly miscalibrated here). The physical/nutrient DRIVERS were tested and HURT
      (same driver-null pattern as M1 / bacteria / news / wave-tide), so the headline is the lean
      DA+precursor set, NOT the full driver matrix. This is the marine-HAB frontier headline,
      separate from the fundable bacteria headline.

