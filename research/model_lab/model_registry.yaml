# Monterey Bay AI Lab — Model Registry (single source of truth)
#
# One entry per model. The suite (research/model_lab/model_suite.py) validates this file and
# renders MODEL_SUITE.md from it. FAIL-CLOSED: a model is "claimable" only if it is listed here
# with claimable: true AND an existing evidence file. Anything unlisted is not claimable.
#
# status enum:
#   production_candidate      - beats the honest baseline, calibrated, validated; lead with it
#   benchmark                 - a comparator we run to bound/contextualize, not a headline claim
#   research_candidate        - exploratory; not validated as a win
#   research_only_failed_gate - ran, but FAILED the value gate (does not beat best-naive); shelved
#   negative_result           - the result IS that there is no effect; a deliverable, not a model
#   baseline                  - an operational/regulatory comparator (what we must beat)
#   retired_claim             - a claim we withdrew (kept only as a cautionary record)
#   orphaned                  - appeared in champion/selector evidence but has NO reproducible
#                               serving path; a historical horizon-specific artifact, not runnable
# family enum: tree | neural | foundation | continual | baseline | detector
# task enum:   bacteria_classification | m1_forecasting | bacteria_event_detection |
#              domoic_acid_forecasting
#
# Optional hardening fields (consumed by the model-hardening audit; not required for validation):
#   smoke_command     - the exact, output-isolated command that exercises this model cheaply;
#                       "" means no cheap smoke seam exists (heavy run, orphaned, or zero-shot rerun).
#   baseline          - the honest baseline this model must beat to be claimable.
#   output_dir_policy - where this model is allowed to write; how production outputs are protected.

models:
  - model_id: bacteria_hgbt_isotonic
    family: tree
    architecture: HistGradientBoostingClassifier + isotonic calibration
    task: bacteria_classification
    status: production_candidate
    claimable: true
    beats_baseline: "yes — beats AB411, Virtual-Beach MLR, and station-memory"
    supports_calibration: true
    dependencies: [scikit-learn]
    entrypoint: research/bacteria/operational_benchmark.py
    smoke_command: "python research/model_lab/model_suite.py --suite bacteria"
    baseline: "AB411 rain rule, Virtual-Beach MLR, station-memory"
    output_dir_policy: "reports/operational_benchmark/ (suite writes model_suite_bacteria.json); never overwrites production leaderboards"
    evidence: research/bacteria/reproduce/expected/operational_benchmark.json
    blockers: "prospective forward-time pilot + partner available_at lab timestamps"
    notes: >-
      Incumbent champion. San-Diego-excluded enterococcus, operational
      reveal_lag_days=2 config — the tracked reproduction evidence
      (research/bacteria/reproduce/expected/operational_benchmark.json):
      ROC-AUC 0.858 / AP 0.497 / ECE 0.020; 9/9 leave-one-county-out wins.
      Byte-reproducible from a clean clone; same model within noise across
      reveal lags. Full derivation in research/bacteria/reproduce/PAPER_DRAFT.md.

  - model_id: bacteria_hgbt_spatial
    family: tree
    architecture: HistGradientBoostingClassifier + isotonic + learned lat/lon spatial surface
    task: bacteria_classification
    status: production_candidate
    claimable: true
    beats_baseline: "yes — +0.034 AP over the no-spatial driver model, on never-seen beaches"
    supports_calibration: true
    dependencies: [scikit-learn]
    entrypoint: research/bacteria/spatial_drivers_experiment.py
    smoke_command: "python research/bacteria/spatial_drivers_experiment.py --k 2 --n-perm 1 --out-dir reports/model_hardening/smoke/spatial"
    baseline: "no-spatial driver HGBT (must add AP on never-seen beaches); AB411 / Virtual-Beach MLR / station-memory"
    output_dir_policy: "research/bacteria/reproduce/ artifacts; LOBO study, not a production leaderboard"
    evidence: research/bacteria/reproduce/PAPER_DRAFT.md
    blockers: "residual Moran's I 0.20 still significant; gain is rainfall-conditioned"
    notes: >-
      Adds raw station coordinates so the model learns an interpolable spatial risk surface.
      Lift is LOBO-verified (generalizes to unmonitored beaches), stable across 5-fold
      leave-one-beach-out (single seed=42; this is 5 folds, not 5 seeds), not a
      county proxy. The basis for risk estimates at unmonitored sites.

